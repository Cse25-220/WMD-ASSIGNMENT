<!DOCTYPE html>
<html lang="en">
<head>                  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Kickzone-Cart</title>
<link rel="stylesheet" href="style.css">
</head> 
<body>

   <!-- NAVBAR-->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">KICK<span>ZONE</span></a>
      <div class="nav-menu">
        <a href="index.html" class="active">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="nav-cart">🛒 Cart <span class="cart-count">0</span></a>
      </div>
    </div>
  </nav>

  <!--PAGE Hero--->
<div class=""page-hero">
  <div class="container">
    <p class="section-subtitle">Your Cart</p>
<h1 class="section title">SHOPPING<span class="highlight"> CART</span></h1>
  </div>
</div>

 <div class="section" style="padding-top:40px;">
    <div class="container">
      <div id="cartContent"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <div class="footer-top">
        <div class="footer-brand">
          <div class="logo">KICK<span>ZONE</span></div>
          <p>Your home for authentic football shirts and boots.</p>
        </div>
        <div class="footer-col">
          <h4>Shop</h4>
          <ul><li><a href="shop.html">All Products</a></li></ul>
        </div>
        <div class="footer-col">
          <h4>Help</h4>
          <ul><li><a href="faq.html">FAQ</a></li><li><a href="contact.html">Contact</a></li></ul>
        </div>
        <div class="footer-col">
          <h4>Company</h4>
          <ul><li><a href="about.html">About Us</a></li></ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2024 KickZone Ltd. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="store.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const cartContent = document.getElementById('cartContent');
      updateCartCount();

      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="empty-cart">
            <div class="icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added anything yet. Head to the shop to find your perfect kit!</p>
            <a href="shop.html" class="btn btn-primary">Browse Products</a>
          </div>
        `;
        return;
      }

      let subtotal = 0;
      const rows = cart.map(item => {
        const p = products.find(prod => prod.id === item.id);
        if (!p) return '';
        const lineTotal = p.price * item.qty;
        subtotal += lineTotal;
        return `
          <tr>
            <td>
              <div class="cart-item-info">
                <img src="${p.img}" alt="${p.name}" class="cart-item-img"/>
                <div>
                  <div class="cart-item-brand">${p.brand}</div>
                  <div class="cart-item-name">${p.name}</div>
                  <div style="font-size:0.8rem;color:#888;margin-top:2px;">${p.category === 'shirts' ? '⚽ Shirt' : '👟 Boots'}</div>
                </div>
              </div>
            </td>
            <td>£${p.price.toFixed(2)}</td>
            <td>
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
                <span class="qty-val">${item.qty}</span>
                <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
              </div>
            </td>
            <td>£${lineTotal.toFixed(2)}</td>
            <td>
              <button class="remove-btn" onclick="removeItem(${p.id})" title="Remove">✕</button>
            </td>
          </tr>
        `;
      }).join('');

      const delivery = subtotal >= 50 ? 0 : 4.99;
      const total = subtotal + delivery;

      cartContent.innerHTML = `
        <div class="cart-layout">
          <div>
            <table class="cart-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Price</th>
                  <th>Qty</th>
                  <th>Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
            <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;">
              <a href="shop.html" class="btn btn-outline">← Continue Shopping</a>
              <button class="btn btn-dark" onclick="clearCartAll()">Clear Cart</button>
            </div>
          </div>

          <div class="order-summary">
            <h3>ORDER SUMMARY</h3>
            <div class="summary-row"><span>Subtotal</span><span>£${subtotal.toFixed(2)}</span></div>
            <div class="summary-row">
              <span>Delivery</span>
              <span>${delivery === 0 ? '<span style="color:var(--green)">FREE</span>' : '£' + delivery.toFixed(2)}</span>
            </div>
            ${delivery > 0 ? `<div style="font-size:0.8rem;color:#888;padding:6px 0;">Add £${(50 - subtotal).toFixed(2)} more for free delivery!</div>` : ''}
            <div class="summary-row total"><span>Total</span><span>£${total.toFixed(2)}</span></div>

            <div class="coupon-input">
              <input type="text" id="couponInput" placeholder="Coupon code..."/>
              <button class="btn btn-dark" onclick="applyCoupon()" style="white-space:nowrap;">Apply</button>
            </div>

            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
            <div style="text-align:center;margin-top:14px;font-size:0.8rem;color:#888;">🔒 Secure SSL checkout</div>
            <div style="text-align:center;margin-top:6px;font-size:0.85rem;color:#888;">Visa · Mastercard · PayPal · Apple Pay</div>
          </div>
        </div>
      `;
    }

    function changeQty(id, delta) {
      const cart = getCart();
      const item = cart.find(i => i.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) {
        cart.splice(cart.indexOf(item), 1);
      }
      saveCart(cart);
      renderCart();
    }

    function removeItem(id) {
      const cart = getCart().filter(i => i.id !== id);
      saveCart(cart);
      renderCart();
      showToast('🗑️ Item removed');
    }

    function clearCartAll() {
      saveCart([]);
      renderCart();
      showToast('🗑️ Cart cleared');
    }

    function applyCoupon() {
      const code = document.getElementById('couponInput').value.trim().toUpperCase();
      if (code === 'KICKZONE20') {
        showToast('🎉 20% discount applied!');
      } else {
        showToast('❌ Invalid coupon code');
      }
    }

    function checkout() {
      showToast('🚀 Redirecting to checkout...');
      setTimeout(() => alert('Thank you for your order! This is a college demo — no real payment is taken. 😊'), 1500);
    }

    renderCart();
  </script>
</body>
</html>
