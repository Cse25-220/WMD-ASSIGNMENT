<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>



    <header class="navbar">
        <div class="nav-brand">
            <span class="logo-text">MATCH DAY <span class="green-text">CENTRAL</span></span>
            </div>

        
    <nav class="nav-menu">
        <a href="index.html" class="nav-link active">HOME</a>
        <a href="news.html" class="nav-link">NEWS</a>

        <a href="contact.html" class="nav-link">CONTACT</a>
    </nav>
    </header>

    <main class="page-container">

  <div class="page-header">
    <p class="breadcrumbs"><a href="index.html">Home</a> > <span>Contact Us</span></p>
    <h1>CONTACT US</h1>
  </div>

  <div class="contact-page-layout">
    
    <section class="form-container">
      <h2>SEND US A MESSAGE</h2>
      
      <form action="#" class="contact-form">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" placeholder="Your name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Your email address" required>
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="general">General Inquiry</option>
            <option value="feedback">Website Feedback</option>
            <option value="advertising">Advertising / Partnership</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Type your message here..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">SEND MESSAGE</button>
      </form>
    </section>

    <aside class="contact-details-sidebar">
      <h2>GET IN TOUCH</h2>
      
      <div class="info-blocks">
        <div class="info-item">
          <span class="info-icon">📧</span>
          <div class="info-text">
            <h4>Email</h4>
            <p>info@matchdaycentral.com</p>
          </div>
        </div>

        <div class="info-item">
          <span class="info-icon">📞</span>
          <div class="info-text">
            <h4>Phone</h4>
            <p>71584434</p>
          </div>
        </div>

        
      <div class="social-follow">
        <h4>FOLLOW US</h4>
        <div class="social-icons-row">
          <a href="#" class="social-circle">f</a>
          <a href="#" class="social-circle">𝕏</a>
          <a href="#" class="social-circle">📸</a>
          <a href="#" class="social-circle">▶️</a>
        </div>
      </div>
    </aside>

  </div>
</main>

<footer class="main-footer">
    <div class="footer-content">
      <div class="nav-brand">
        <span class="logo-icon">⚽</span>
        <span class="logo-text">MATCH DAY <span class="green-text">CENTRAL</span></span>
      </div>
      <p>&copy; 2026 Match Day Central. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
